name: Medium and High Nuclei Scan

on:
  workflow_dispatch:

jobs:
  nuclei-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: read

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Check targets file
        run: |
          if [ ! -f targets.txt ]; then
            echo "ERROR: targets.txt was not found."
            echo "Create targets.txt in the main repository folder."
            exit 1
          fi

          echo "Targets being scanned:"
          cat targets.txt

      - name: Install Nuclei
        run: |
          curl -s https://api.github.com/repos/projectdiscovery/nuclei/releases/latest \
          | grep "browser_download_url.*linux_amd64.zip" \
          | cut -d '"' -f 4 \
          | wget -qi -

          unzip -o nuclei_*_linux_amd64.zip
          sudo mv nuclei /usr/local/bin/nuclei

          nuclei -version

      - name: Update Nuclei templates
        run: |
          nuclei -update-templates

      - name: Run medium and high scan
        continue-on-error: true
        run: |
          mkdir -p scan-results

          nuclei \
            -list targets.txt \
            -severity medium,high \
            -exclude-tags dos,fuzz,bruteforce,credential-stuffing,token-spray \
            -rate-limit 10 \
            -concurrency 5 \
            -bulk-size 3 \
            -timeout 8 \
            -retries 0 \
            -max-host-error 20 \
            -jsonl-export scan-results/nuclei-results.jsonl \
            -markdown-export scan-results/markdown \
            -stats

      - name: Create empty results file if nothing was found
        if: always()
        run: |
          mkdir -p scan-results

          if [ ! -f scan-results/nuclei-results.jsonl ]; then
            touch scan-results/nuclei-results.jsonl
          fi

          echo "Scan completed."
          echo "Number of findings:"
          wc -l scan-results/nuclei-results.jsonl

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nuclei-medium-high-results
          path: scan-results/
          retention-days: 14